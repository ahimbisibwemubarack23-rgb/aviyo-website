<!-- public/images/logo.svg -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2D6A4F;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1B4D3E;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="url(#grad)" />
  
  <!-- Leaf icon -->
  <path d="M100 30 
           C80 30 60 50 60 80 
           C60 110 80 140 100 170 
           C120 140 140 110 140 80 
           C140 50 120 30 100 30Z" 
        fill="#FDF6E3" opacity="0.9"/>
  
  <!-- Leaf vein -->
  <path d="M100 30 L100 170" 
        stroke="#D4A373" stroke-width="2" opacity="0.5"/>
  
  <!-- Small leaf detail -->
  <path d="M100 60 
           C90 60 80 70 80 85 
           C80 100 90 115 100 125" 
        fill="none" stroke="#D4A373" stroke-width="1.5" opacity="0.4"/>
  
  <path d="M100 60 
           C110 60 120 70 120 85 
           C120 100 110 115 100 125" 
        fill="none" stroke="#D4A373" stroke-width="1.5" opacity="0.4"/>
  
  <!-- Text -->
  <text x="100" y="190" 
        font-family="Arial, sans-serif" 
        font-size="16" 
        font-weight="bold" 
        fill="#FDF6E3" 
        text-anchor="middle">
    AVIYO
  </text>
</svg>